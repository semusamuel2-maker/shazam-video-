<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CanRE — Investment Data Platform (v1 demo)</title>
  <link href="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root { --ink:#1f2937; --muted:#6b7280; --accent:#1d4ed8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--ink); }
    header { padding:12px 18px; background:#0f172a; color:#fff; display:flex; align-items:center; gap:12px; }
    header h1 { font-size:16px; margin:0; font-weight:600; }
    header .tag { font-size:11px; background:#1d4ed8; padding:2px 8px; border-radius:10px; }
    .layout { display:grid; grid-template-columns:360px 1fr; height:calc(100vh - 48px); }
    .panel { overflow-y:auto; border-right:1px solid #e5e7eb; padding:14px; }
    #map { height:100%; }
    .filters label { display:block; font-size:12px; color:var(--muted); margin:8px 0 2px; }
    .filters input, .filters select { width:100%; padding:6px; border:1px solid #d1d5db; border-radius:6px; }
    button { margin-top:12px; width:100%; padding:9px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
    .hit { border:1px solid #e5e7eb; border-radius:8px; padding:10px; margin-top:10px; cursor:pointer; }
    .hit:hover { border-color:var(--accent); }
    .hit .addr { font-weight:600; font-size:14px; }
    .hit .meta { font-size:12px; color:var(--muted); margin-top:4px; }
    .badge { display:inline-block; font-size:10px; padding:2px 6px; border-radius:10px; background:#fee2e2; color:#991b1b; margin-right:4px; margin-top:4px; }
    .detail { font-size:13px; }
    .detail h3 { margin:6px 0; }
    .detail .row { display:flex; justify-content:space-between; border-bottom:1px solid #f3f4f6; padding:4px 0; }
    .note { font-size:11px; color:var(--muted); margin-top:14px; line-height:1.4; }
  </style>
</head>
<body>
  <header>
    <h1>Canadian Real Estate Investment Data Platform</h1>
    <span class="tag">v1 demo · Ontario</span>
  </header>
  <div class="layout">
    <div class="panel">
      <div class="filters">
        <strong>Filters</strong>
        <label>Municipality</label>
        <input id="muni" placeholder="e.g. Peterborough" />
        <label>Distress type</label>
        <select id="distress">
          <option value="">Any</option>
          <option value="tax_sale">Tax sale</option>
          <option value="absentee_owner">Absentee owner</option>
          <option value="long_held">Long held</option>
        </select>
        <label>Min assessed value</label>
        <input id="minval" type="number" placeholder="0" />
        <button onclick="runSearch()">Search</button>
      </div>
      <div id="results"></div>
      <div id="detail"></div>
      <p class="note">Distress signals shown here are real public tax-sale notices; assessment/
        ownership values in this demo are synthetic placeholders for licensed data. See README.</p>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js"></script>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://demotiles.maplibre.org/style.json',
      center: [-78.32, 44.30], zoom: 8
    });
    let markers = [];

    async function runSearch() {
      const body = {
        province: 'ON',
        municipality: document.getElementById('muni').value || null,
        distress_types: document.getElementById('distress').value ? [document.getElementById('distress').value] : null,
        min_value: document.getElementById('minval').value ? Number(document.getElementById('minval').value) : null,
      };
      const res = await fetch('/api/search', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const hits = await res.json();
      renderResults(hits);
    }

    function renderResults(hits) {
      document.getElementById('detail').innerHTML = '';
      const el = document.getElementById('results');
      markers.forEach(m => m.remove()); markers = [];
      el.innerHTML = `<p style="font-size:12px;color:#6b7280">${hits.length} result(s)</p>`;
      hits.forEach(h => {
        const badges = h.distress_types.map(t => `<span class="badge">${t}</span>`).join('');
        const card = document.createElement('div');
        card.className = 'hit';
        card.innerHTML = `<div class="addr">${h.parcel.address || h.parcel.parcel_id}</div>
          <div class="meta">${h.parcel.municipality || ''} · assessed: ${h.assessed_value ? '$'+h.assessed_value.toLocaleString() : 'n/a'} · ${h.owner_type || 'owner n/a'}</div>
          <div>${badges}</div>`;
        card.onclick = () => loadDetail(h.parcel.id);
        el.appendChild(card);
        if (h.parcel.latitude && h.parcel.longitude) {
          const mk = new maplibregl.Marker().setLngLat([h.parcel.longitude, h.parcel.latitude])
            .setPopup(new maplibregl.Popup().setText(h.parcel.address || h.parcel.parcel_id)).addTo(map);
          markers.push(mk);
        }
      });
    }

    async function loadDetail(id) {
      const res = await fetch('/api/properties/' + id);
      const d = await res.json();
      const a = d.assessment || {}, o = d.ownership || {}, c = d.comp || {};
      document.getElementById('detail').innerHTML = `
        <div class="detail">
          <h3>${d.parcel.address || d.parcel.parcel_id}</h3>
          <div class="row"><span>Assessed value</span><span>${a.assessed_value ? '$'+a.assessed_value.toLocaleString() : 'n/a'}</span></div>
          <div class="row"><span>Year built</span><span>${a.year_built || 'n/a'}</span></div>
          <div class="row"><span>Owner</span><span>${o.owner_name || 'n/a'}</span></div>
          <div class="row"><span>Owner type</span><span>${o.owner_type || 'n/a'}</span></div>
          <div class="row"><span>Comp estimate</span><span>${c.estimated_value ? '$'+c.estimated_value.toLocaleString() : 'n/a'} (${c.method})</span></div>
          <div class="row"><span>Distress</span><span>${d.distress_signals.map(s=>s.signal_type).join(', ') || 'none'}</span></div>
        </div>`;
    }

    runSearch();
  </script>
</body>
</html>
