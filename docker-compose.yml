services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: prop
      POSTGRES_PASSWORD: prop
      POSTGRES_DB: prop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
